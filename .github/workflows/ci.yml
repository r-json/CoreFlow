name: CoreFlow CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ─── Soroban Smart Contract ────────────────────────────────────────
  contract-build:
    name: Build Smart Contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/core-flow/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/core-flow/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build contract (WASM)
        working-directory: contracts/core-flow
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: coreflow-contract-wasm
          path: contracts/core-flow/target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 30

  contract-test:
    name: Run Contract Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/core-flow/target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('contracts/core-flow/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-

      - name: Run unit tests
        working-directory: contracts/core-flow
        run: cargo test --verbose

  contract-lint:
    name: Lint Smart Contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            contracts/core-flow/target/
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('contracts/core-flow/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Check formatting
        working-directory: contracts/core-flow
        run: cargo fmt -- --check

      - name: Run Clippy
        working-directory: contracts/core-flow
        run: cargo clippy -- -D warnings

  # ─── Next.js Frontend ─────────────────────────────────────────────
  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Build production bundle
        run: npm run build
        env:
          # The Prisma client is constructed at module import during `next build`,
          # so these must be present even though no DB connection is opened here.
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
          DIRECT_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
          AUTH_SECRET: ci-build-placeholder-secret-not-used-at-runtime-0000
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_STELLAR_READ_ADDRESS: GAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWHF
          NEXT_PUBLIC_STELLAR_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD2KM
          NEXT_PUBLIC_FREIGHTER_TIMEOUT: "5000"

  # ─── End-to-End (Playwright) ──────────────────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build production bundle
        run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
          DIRECT_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
          AUTH_SECRET: ci-build-placeholder-secret-not-used-at-runtime-0000
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_STELLAR_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD2KM
          NEXT_PUBLIC_FREIGHTER_TIMEOUT: "5000"

      - name: Run E2E tests
        run: npm run e2e
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
          DIRECT_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
          AUTH_SECRET: ci-build-placeholder-secret-not-used-at-runtime-0000
          NEXT_PUBLIC_STELLAR_NETWORK: testnet
          NEXT_PUBLIC_STELLAR_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD2KM
